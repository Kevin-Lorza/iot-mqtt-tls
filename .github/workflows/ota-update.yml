name: OTA Update to ESP32 via MQTT TLS

on:
  push:
    branches:
      - main          # compila en cada push (sin subir a S3)
    tags:
      - 'v*.*.*'      # compila + sube a S3 + notifica OTA
  pull_request:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Python es necesario para PlatformIO y los scripts de build
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3. Instalar PlatformIO (el IDE/CLI para ESP32)
      - name: Set up PlatformIO
        run: pip install platformio

      # 4. Detectar si es un tag de versión o un build de desarrollo
      #    - Tag v1.2.0  → FIRMWARE_VERSION=v1.2.0
      #    - Push a main → FIRMWARE_VERSION=dev-2026-04-16_10-30
      - name: Set firmware version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "FIRMWARE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            DATE=$(date -u +"%Y-%m-%d_%H-%M")
            echo "FIRMWARE_VERSION=dev-${DATE}" >> $GITHUB_ENV
          fi

      # 5. Definir el nombre del archivo de salida
      - name: Set firmware filename
        run: echo "FIRMWARE_NAME=firmware_${FIRMWARE_VERSION}.bin" >> $GITHUB_ENV

      # 6. Compilar el firmware con PlatformIO
      #    Los secrets se inyectan como variables de entorno que
      #    platformio.ini lee con ${sysenv.VARIABLE}
      - name: Build firmware
        run: platformio run
        env:
          COUNTRY: ${{ secrets.COUNTRY }}
          STATE: ${{ secrets.STATE }}
          CITY: ${{ secrets.CITY }}
          MQTT_SERVER: ${{ secrets.MQTT_SERVER }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}

      # 7. Subir a S3 (solo cuando es un tag de versión)
      - name: Upload to S3
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          aws s3 cp .pio/build/esp32dev/firmware.bin \
            s3://${{ secrets.S3_BUCKET_NAME }}/$FIRMWARE_NAME \
            --content-type application/octet-stream
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      # 8. Notificar a los dispositivos por MQTT (solo en tags de versión)
      #    El mensaje JSON indica la versión y la URL de descarga del firmware
      - name: Publish MQTT OTA message
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pip install paho-mqtt
          python3 -c "
          import os, json, paho.mqtt.publish as publish
          url = 'https://{bucket}.s3.{region}.amazonaws.com/{firmware}'.format(
            bucket=os.getenv('S3_BUCKET_NAME'),
            region=os.getenv('AWS_REGION'),
            firmware=os.getenv('FIRMWARE_NAME')
          )
          payload = json.dumps({
            'version': os.getenv('FIRMWARE_VERSION'),
            'url': url
          })
          publish.single(
            topic=os.getenv('DEVICE_TOPIC'),
            payload=payload,
            hostname=os.getenv('MQTT_SERVER'),
            port=int(os.getenv('MQTT_PORT')),
            auth={'username': os.getenv('MQTT_USER'), 'password': os.getenv('MQTT_PASSWORD')}
                  if os.getenv('MQTT_USER') else None,
            tls={} if os.getenv('MQTT_TLS', 'false') == 'true' else None
          )
          print('OTA message sent:', payload)
          "
        env:
          DEVICE_TOPIC: dispositivo/device1/ota
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          MQTT_SERVER: ${{ secrets.MQTT_SERVER }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          MQTT_TLS: ${{ secrets.MQTT_TLS }}
